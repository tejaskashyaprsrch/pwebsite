<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Electoral Systems</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">Electoral Research</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="simulations.html">Simulations</a></li>
      <li><a href="future.html">Future Work</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </nav>

  <header class="page-header">
    <div class="container">
      <span class="hero-label">Get in Touch</span>
      <h1 class="page-title">Contact</h1>
    </div>
  </header>

  <main class="container page-content">

    <section class="research-section" id="about">
      <div class="research-label">About</div>
      <h2 class="research-heading" id="contact-name"><!-- CONTENT: Your name --></h2>
      <div class="research-body">
        <p id="bio-text"><!-- CONTENT: Write a short bio — who you are, your background, what drives your interest in electoral modeling and computational social science. 2–4 sentences is fine. --></p>
      </div>
    </section>

    <div class="section-divider"></div>

    <section class="research-section" id="links">
      <div class="research-label">Links</div>
      <h2 class="research-heading">Find Me</h2>
      <div class="research-body">
        <div class="contact-grid">

          <a href="mailto:your@email.com" class="contact-card" id="contact-email">
            <div class="contact-icon">✉</div>
            <div>
              <div class="contact-type">Email</div>
              <div class="contact-value" id="email-value"><!-- CONTENT: your@email.com --></div>
            </div>
          </a>

          <a href="https://github.com/" target="_blank" class="contact-card" id="contact-github">
            <div class="contact-icon">⌥</div>
            <div>
              <div class="contact-type">GitHub</div>
              <div class="contact-value" id="github-value"><!-- CONTENT: github.com/yourusername --></div>
            </div>
          </a>

          <a href="https://linkedin.com/" target="_blank" class="contact-card" id="contact-linkedin">
            <div class="contact-icon">⊞</div>
            <div>
              <div class="contact-type">LinkedIn</div>
              <div class="contact-value" id="linkedin-value"><!-- CONTENT: linkedin.com/in/yourprofile --></div>
            </div>
          </a>

          <!-- Add or remove contact cards as needed -->
          <!-- 
          <a href="https://twitter.com/" target="_blank" class="contact-card">
            <div class="contact-icon">◈</div>
            <div>
              <div class="contact-type">Twitter / X</div>
              <div class="contact-value">@yourhandle</div>
            </div>
          </a>
          -->

        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <section class="research-section" id="source">
      <div class="research-label">Source Code</div>
      <h2 class="research-heading">Code Repository</h2>
      <div class="research-body">
        <p id="repo-text"><!-- CONTENT: Describe where the source code lives. Point to your GitHub repo. Mention the main files: voterSim.py, voterThirdPartySim.py, claudeElectionModel.py, voterMultiPartyExample.py. --></p>
        <a href="https://github.com/" target="_blank" class="btn btn-primary" id="repo-link" style="margin-top: 1.5rem; display: inline-block;">View on GitHub</a>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-name" id="footer-name"><!-- CONTENT: Your name --></span>
      <span class="footer-sep">·</span>
      <a href="contact.html" class="footer-link">Contact</a>
      <span class="footer-sep">·</span>
      <a href="https://github.com/" class="footer-link" id="footer-github" target="_blank">GitHub</a>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
